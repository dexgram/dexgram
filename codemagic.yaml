workflows:
  android-release:
    name: Android Release
    instance_type: linux_x2
    max_build_duration: 120

    environment:
      groups:
        - github_release
      java: 21
      android_signing:
        - dexgram
      vars:
        PACKAGE_NAME: "com.dexgram.app"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "master"
          include: true
          source: true
      tag_patterns:
        - pattern: "*"
          include: true

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.android/build-cache

    scripts:
      - name: Prepare Android SDK and Gradle wrapper
        script: |
          set -e

          perl -pi -e 's/\r$//' gradlew gradlew.bat
          chmod +x gradlew

          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT or ANDROID_HOME must be set"
            exit 1
          fi

          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties

          SDKMANAGER=""
          for candidate in \
            "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK_DIR/cmdline-tools/bin/sdkmanager" \
            "$SDK_DIR/tools/bin/sdkmanager"
          do
            if [ -x "$candidate" ]; then
              SDKMANAGER="$candidate"
              break
            fi
          done

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found."
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
            echo "ANDROID_HOME=${ANDROID_HOME:-}"
            find "$SDK_DIR" -maxdepth 4 -name sdkmanager -print || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.22.1"

      - name: Download Android native libraries
        script: |
          set -e

          LIBS_DIR="common/src/commonMain/cpp/android/libs"
          mkdir -p "$LIBS_DIR/arm64-v8a" "$LIBS_DIR/armeabi-v7a"

          curl -fL --retry 3 --retry-delay 5 \
            "https://bucket.dexgram.com/arm64-v8a/libsimplex.so" \
            -o "$LIBS_DIR/arm64-v8a/libsimplex.so"

          curl -fL --retry 3 --retry-delay 5 \
            "https://bucket.dexgram.com/arm64-v8a/libsupport.so" \
            -o "$LIBS_DIR/arm64-v8a/libsupport.so"

          curl -fL --retry 3 --retry-delay 5 \
            "https://bucket.dexgram.com/armeabi-v7a/libsimplex.so" \
            -o "$LIBS_DIR/armeabi-v7a/libsimplex.so"

          curl -fL --retry 3 --retry-delay 5 \
            "https://bucket.dexgram.com/armeabi-v7a/libsupport.so" \
            -o "$LIBS_DIR/armeabi-v7a/libsupport.so"

          test -s "$LIBS_DIR/arm64-v8a/libsimplex.so"
          test -s "$LIBS_DIR/arm64-v8a/libsupport.so"
          test -s "$LIBS_DIR/armeabi-v7a/libsimplex.so"
          test -s "$LIBS_DIR/armeabi-v7a/libsupport.so"

          cat > "$LIBS_DIR/SHA256SUMS" <<'EOF'
          dbd3d3fd90e251c7088e4db9d651342a8ad8b55f6b18961794632421a9da2e8a  arm64-v8a/libsimplex.so
          9a9c22d02632b34a3dc2663431ab75d8fe439d4556fb9e438bea88e1ea9cd49f  arm64-v8a/libsupport.so
          532013fc3f16f06b3fadc69bd0a214ca225cee43b09609d561dc63376a2163ce  armeabi-v7a/libsimplex.so
          e8d3489fec86fb4074a23b711c9dfe61aacdab8bcf9755a33cb317d2beb20b57  armeabi-v7a/libsupport.so
          EOF

          (
            cd "$LIBS_DIR"
            sha256sum -c SHA256SUMS
          )

          ls -lh "$LIBS_DIR/arm64-v8a" "$LIBS_DIR/armeabi-v7a"

      - name: Set Android version from Git tag
        script: |
          set -e

          if [ -z "${CM_TAG:-}" ]; then
            echo "No Git tag detected. Keeping version from gradle.properties."
            exit 0
          fi

          VERSION_NAME="${CM_TAG#v}"
          VERSION_CODE="${CM_BUILD_NUMBER:-1}"

          echo "Using Android versionName=$VERSION_NAME versionCode=$VERSION_CODE"

          perl -pi -e "s/^android\.version_name=.*/android.version_name=$VERSION_NAME/" gradle.properties
          perl -pi -e "s/^android\.version_code=.*/android.version_code=$VERSION_CODE/" gradle.properties

      - name: Validate signing variables
        script: |
          set -e

          for name in CM_KEYSTORE_PATH CM_KEYSTORE_PASSWORD CM_KEY_ALIAS; do
            value="$(eval "printf '%s' \"\${$name:-}\"")"
            if [ -z "$value" ]; then
              echo "$name is missing. Check the Codemagic Android code signing identity."
              exit 1
            fi
          done

          if [ -z "${CM_KEY_PASSWORD:-}" ]; then
            echo "CM_KEY_PASSWORD is missing. Falling back to CM_KEYSTORE_PASSWORD."
            echo "If your key password differs from your keystore password, add it in the Codemagic keystore settings."
          fi

      - name: Build signed APK and AAB
        script: |
          set -e

          KEY_PASSWORD="${CM_KEY_PASSWORD:-$CM_KEYSTORE_PASSWORD}"

          ./gradlew --no-daemon \
            :android:assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

          ./gradlew --no-daemon \
            :android:bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect release files
        script: |
          set -e

          VERSION_NAME="$(sed -n 's/^android\.version_name=//p' gradle.properties)"
          SAFE_VERSION_NAME="$(printf '%s' "$VERSION_NAME" | tr '.' '-' | sed 's/[^A-Za-z0-9_-]/-/g')"

          mkdir -p build/codemagic-artifacts

          APK_FOUND=0
          for apk in android/build/outputs/apk/release/*.apk; do
            [ -e "$apk" ] || continue

            case "$apk" in
              *arm64-v8a*) ABI="arm64-v8a" ;;
              *armeabi-v7a*) ABI="armeabi-v7a" ;;
              *) ABI="universal" ;;
            esac

            cp "$apk" "build/codemagic-artifacts/dexgram-v${SAFE_VERSION_NAME}-${ABI}.apk"
            APK_FOUND=1
          done

          AAB_FOUND=0
          for aab in android/build/outputs/bundle/release/*.aab; do
            [ -e "$aab" ] || continue
            cp "$aab" "build/codemagic-artifacts/dexgram-v${SAFE_VERSION_NAME}.aab"
            AAB_FOUND=1
          done

          [ "$APK_FOUND" -eq 1 ]
          [ "$AAB_FOUND" -eq 1 ]

          ls -la build/codemagic-artifacts

    artifacts:
      - build/codemagic-artifacts/*.apk
      - build/codemagic-artifacts/*.aab
      - android/build/outputs/mapping/release/mapping.txt

    publishing:
      scripts:
        - name: Publish tagged builds to GitHub Releases
          script: |
            set -e

            if [ -z "${CM_TAG:-}" ]; then
              echo "Not a tag build. Skipping GitHub release publishing."
              exit 0
            fi

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is not set. Skipping GitHub release publishing."
              exit 0
            fi

            gh release create "$CM_TAG" \
              --title "DEXGRAM $CM_TAG" \
              --notes "Automated signed Android release from Codemagic build $CM_BUILD_ID." \
              build/codemagic-artifacts/*
