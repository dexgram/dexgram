workflows:
  android-release:
    name: Android Release
    instance_type: linux_x2
    max_build_duration: 120

    environment:
      groups:
        - github_release
      java: 21
      android_signing:
        - dexgram
      vars:
        PACKAGE_NAME: "com.dexgram.app"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "master"
          include: true
          source: true
      tag_patterns:
        - pattern: "*"
          include: true

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.android/build-cache

    scripts:
      - name: Prepare Android SDK and Gradle wrapper
        script: |
          set -e

          perl -pi -e 's/\r$//' gradlew gradlew.bat
          chmod +x gradlew

          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT or ANDROID_HOME must be set"
            exit 1
          fi

          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties

          SDKMANAGER=""
          for candidate in \
            "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK_DIR/cmdline-tools/bin/sdkmanager" \
            "$SDK_DIR/tools/bin/sdkmanager"
          do
            if [ -x "$candidate" ]; then
              SDKMANAGER="$candidate"
              break
            fi
          done

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found."
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
            echo "ANDROID_HOME=${ANDROID_HOME:-}"
            find "$SDK_DIR" -maxdepth 4 -name sdkmanager -print || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.22.1"

      - name: Validate signing variables
        script: |
          set -e

          for name in CM_KEYSTORE_PATH CM_KEYSTORE_PASSWORD CM_KEY_ALIAS; do
            value="$(eval "printf '%s' \"\${$name:-}\"")"
            if [ -z "$value" ]; then
              echo "$name is missing. Check the Codemagic Android code signing identity."
              exit 1
            fi
          done

          if [ -z "${CM_KEY_PASSWORD:-}" ]; then
            echo "CM_KEY_PASSWORD is missing. Falling back to CM_KEYSTORE_PASSWORD."
            echo "If your key password differs from your keystore password, add it in the Codemagic keystore settings."
          fi

      - name: Build signed APK and AAB
        script: |
          set -e

          KEY_PASSWORD="${CM_KEY_PASSWORD:-$CM_KEYSTORE_PASSWORD}"

          ./gradlew --no-daemon \
            :android:assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

          ./gradlew --no-daemon \
            :android:bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect release files
        script: |
          set -e

          mkdir -p build/codemagic-artifacts
          find android/build/outputs/apk/release -name "*.apk" -exec cp {} build/codemagic-artifacts/ \;
          find android/build/outputs/bundle/release -name "*.aab" -exec cp {} build/codemagic-artifacts/ \;

          ls -la build/codemagic-artifacts

    artifacts:
      - build/codemagic-artifacts/*.apk
      - build/codemagic-artifacts/*.aab
      - android/build/outputs/mapping/release/mapping.txt

    publishing:
      scripts:
        - name: Publish tagged builds to GitHub Releases
          script: |
            set -e

            if [ -z "${CM_TAG:-}" ]; then
              echo "Not a tag build. Skipping GitHub release publishing."
              exit 0
            fi

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is not set. Skipping GitHub release publishing."
              exit 0
            fi

            gh release create "$CM_TAG" \
              --title "DEXGRAM $CM_TAG" \
              --notes "Automated signed Android release from Codemagic build $CM_BUILD_ID." \
              build/codemagic-artifacts/*
